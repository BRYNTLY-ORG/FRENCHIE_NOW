name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '21 17 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: [self-hosted, macOS, num5]
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write # Required for Copilot Autofix

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python', 'actions' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@0fa1882f994fbd81a47ab0804f93354f5ea40147 # v3.28.17
      with:
        languages: ${{ matrix.language }}
        # Enable extended queries for better Copilot Autofix coverage
        queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@0fa1882f994fbd81a47ab0804f93354f5ea40147 # v3.28.17

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@0fa1882f994fbd81a47ab0804f93354f5ea40147 # v3.28.17
      with:
        category: "/language:${{matrix.language}}"
