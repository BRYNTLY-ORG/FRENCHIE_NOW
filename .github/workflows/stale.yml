name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: [self-hosted, macOS, num5]
    steps:
      - uses: actions/stale@1160a2240286f5f0d350974c5ad7c2a748d8879b # v9.0.0
        with:
          stale-issue-message: 'This issue is stale because it has been open 30 days with no activity. Remove stale label or comment or this will be closed in 5 days.'
          stale-pr-message: 'This PR is stale because it has been open 45 days with no activity. Remove stale label or comment or this will be closed in 5 days.'
          close-issue-message: 'This issue was closed because it has been stalled for 5 days with no activity.'
          close-pr-message: 'This PR was closed because it has been stalled for 5 days with no activity.'
          days-before-issue-stale: 30
          days-before-pr-stale: 45
          days-before-close: 5
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-pr-labels: 'dependencies,security,wip'
          exempt-issue-labels: 'bug,security,wip'
