name: Auto-fix review suggestions

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  OLLAMA_AGENT_ASSIGNEES: ${{ vars.OLLAMA_AGENT_ASSIGNEES || '' }}

jobs:
  auto-fix:
    runs-on: [self-hosted, macOS, num5]
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: ${{ vars.AGENT_APP_ID != '' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/actions
      - name: Ensure agent assignees
        uses: ./.github/actions/ensure-agent-assignees
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          agent-assignees: ${{ env.OLLAMA_AGENT_ASSIGNEES }}
          exclude-login: ${{ github.event.pull_request.user.login }}
      - name: Auto-apply suggestions and dispatch agents for verification
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const headRef = context.payload.pull_request.head.ref;
            const headSha = context.payload.pull_request.head.sha;
            const isFork = context.payload.pull_request.head.repo?.full_name
              !== context.payload.pull_request.base.repo?.full_name;
            const eventName = context.eventName;
            const reviewId = context.payload.review?.id || context.payload.comment?.pull_request_review_id || null;
            const triggerComment = context.payload.comment || null;
            const extraAgentMentions = '@gemini-code-assist[bot] @chatgpt-codex-connector[bot] @sentry[bot]';

            const allComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );

            const byId = new Map(allComments.map(comment => [comment.id, comment]));

            function hasSuggestion(body = '') {
              return body.includes('```suggestion') || body.includes('```diff');
            }

            function parseSuggestionText(body = '') {
              const match = body.match(/```suggestion\n([\s\S]*?)```/);
              return match ? match[1] : null;
            }

            function getDepth(comment) {
              let depth = 0;
              let current = comment;
              const seen = new Set();
              while (current?.in_reply_to_id && byId.has(current.in_reply_to_id) && !seen.has(current.in_reply_to_id)) {
                seen.add(current.in_reply_to_id);
                current = byId.get(current.in_reply_to_id);
                depth += 1;
              }
              return depth;
            }

            function getRootComment(comment) {
              let current = comment;
              const seen = new Set();
              while (current?.in_reply_to_id && byId.has(current.in_reply_to_id) && !seen.has(current.in_reply_to_id)) {
                seen.add(current.in_reply_to_id);
                current = byId.get(current.in_reply_to_id);
              }
              return current || comment;
            }

            function collectThread(rootComment) {
              const ids = new Set([rootComment.id]);
              let changed = true;
              while (changed) {
                changed = false;
                for (const comment of allComments) {
                  if (comment.in_reply_to_id && ids.has(comment.in_reply_to_id) && !ids.has(comment.id)) {
                    ids.add(comment.id);
                    changed = true;
                  }
                }
              }

              return allComments
                .filter(comment => ids.has(comment.id))
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            }

            function summarizeThread(comments) {
              function sanitizeSummaryText(text = '') {
                return text
                  .replace(/&/g, '&amp;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;')
                  .replace(/`/g, "'")
                  .replace(/@/g, '@\u200b');
              }

              return comments.map(comment => {
                const depth = Math.min(getDepth(comment), 4);
                const prefix = `${'  '.repeat(depth)}- `;
                const actor = comment.user?.login || 'unknown';
                const file = sanitizeSummaryText(comment.path || 'review-thread');
                const line = comment.line || comment.original_line || '?';
                const firstLine = sanitizeSummaryText(
                  (comment.body || '').split('\n').find(Boolean)?.substring(0, 140) || '(no text)'
                );
                return `${prefix}[${actor}] \`${file}:${line}\`: ${firstLine}`;
              }).join('\n');
            }

            // ── Identify actionable comments ──────────────────────────
            let marker = '';
            let header = '';
            let summary = '';
            let actionableComments = [];

            if (eventName === 'pull_request_review') {
              const reviewComments = allComments.filter(comment => comment.pull_request_review_id === reviewId);
              const actionableRoots = new Map();
              for (const comment of reviewComments) {
                if (!hasSuggestion(comment.body || '')) continue;
                const root = getRootComment(comment);
                actionableRoots.set(root.id, root);
              }

              if (actionableRoots.size === 0) return;

              const threadCommentMap = new Map();
              for (const root of actionableRoots.values()) {
                for (const comment of collectThread(root)) {
                  threadCommentMap.set(comment.id, comment);
                }
              }

              actionableComments = Array.from(threadCommentMap.values())
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              marker = `<!-- review ${reviewId} -->`;
              header = `Review ${reviewId} includes **${actionableRoots.size}** actionable suggestion thread(s).`;
              summary = summarizeThread(actionableComments);
            } else {
              if (!triggerComment) return;

              const rootComment = getRootComment(triggerComment);
              const threadComments = collectThread(rootComment);
              const threadHasSuggestion = threadComments.some(comment => hasSuggestion(comment.body || ''));
              if (!threadHasSuggestion) return;

              actionableComments = threadComments;
              marker = `<!-- review-thread ${rootComment.id} -->`;
              header = `Review thread rooted at comment **${rootComment.id}** contains actionable suggestions, including nested discussion.`;
              summary = summarizeThread(actionableComments);
            }

            // ── Auto-apply suggestion blocks ──────────────────────────
            let autoApplied = 0;
            let autoAppliedFiles = [];

            if (!isFork) {
              const suggestions = [];
              for (const comment of actionableComments) {
                const text = parseSuggestionText(comment.body);
                if (!text) continue;
                if (comment.commit_id !== headSha) continue;
                if (!comment.path || !comment.line) continue;
                suggestions.push({
                  commentId: comment.id,
                  path: comment.path,
                  line: comment.line,
                  startLine: comment.start_line || comment.line,
                  text,
                });
              }

              if (suggestions.length > 0) {
                const byFile = new Map();
                for (const s of suggestions) {
                  if (!byFile.has(s.path)) byFile.set(s.path, []);
                  byFile.get(s.path).push(s);
                }

                try {
                  const treeEntries = [];

                  for (const [path, fileSuggs] of byFile) {
                    fileSuggs.sort((a, b) => b.line - a.line);

                    const { data: fileData } = await github.rest.repos.getContent({
                      owner, repo, path, ref: headSha,
                    });

                    const content = Buffer.from(fileData.content, 'base64').toString();
                    const lines = content.split('\n');

                    for (const s of fileSuggs) {
                      const startIdx = s.startLine - 1;
                      const count = s.line - s.startLine + 1;
                      const newLines = s.text.replace(/\n$/, '').split('\n');
                      lines.splice(startIdx, count, ...newLines);
                    }

                    const { data: blob } = await github.rest.git.createBlob({
                      owner, repo,
                      content: lines.join('\n'),
                      encoding: 'utf-8',
                    });

                    treeEntries.push({ path, mode: '100644', type: 'blob', sha: blob.sha });
                    autoAppliedFiles.push(path);
                  }

                  if (treeEntries.length > 0) {
                    const { data: headCommit } = await github.rest.git.getCommit({
                      owner, repo,
                      commit_sha: headSha,
                    });

                    const { data: tree } = await github.rest.git.createTree({
                      owner, repo,
                      base_tree: headCommit.tree.sha,
                      tree: treeEntries,
                    });

                    const { data: commit } = await github.rest.git.createCommit({
                      owner, repo,
                      message: `Apply ${suggestions.length} review suggestion(s)\n\nAuto-applied by auto-fix-review workflow.`,
                      tree: tree.sha,
                      parents: [headSha],
                    });

                    await github.rest.git.updateRef({
                      owner, repo,
                      ref: `heads/${headRef}`,
                      sha: commit.sha,
                    });

                    autoApplied = suggestions.length;
                    console.log(`Auto-applied ${autoApplied} suggestion(s) across ${autoAppliedFiles.join(', ')}`);
                  }
                } catch (error) {
                  console.log(`Auto-apply failed: ${error.message}. Falling back to agent dispatch.`);
                }
              }
            }

            // ── Post dispatch / verification comment ──────────────────
            const nestedReplyCount = actionableComments.filter(comment => comment.in_reply_to_id).length;

            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 }
            );
            const existingIssueComment = issueComments.find(comment => comment.body?.includes(marker));

            const applied = autoApplied > 0;
            const fileList = autoAppliedFiles.map(f => `\`${f}\``).join(', ');
            const statusLine = applied
              ? `**${autoApplied} suggestion(s) were auto-applied** to ${fileList}.`
              : '';

            const body = [
              marker,
              header,
              statusLine,
              nestedReplyCount > 0
                ? `This summary includes **${nestedReplyCount}** nested reply comment(s) so follow-up context is not lost.`
                : 'This summary contains the actionable top-level review comments for the thread or review.',
              '',
              summary,
              '',
              applied
                ? '@copilot Please verify the auto-applied suggestion(s) are correct and run tests. If any remaining items need manual implementation, handle those as well.'
                : '@copilot Please implement every actionable suggestion above, including guidance contained in nested review-thread replies.',
              `${extraAgentMentions} If you are installed for this repository and relevant to the thread, also inspect the suggestions and contribute any useful fixes or diagnostics.`,
              'Accept suggestions where appropriate, reconcile overlapping notes, and run tests to verify the branch still behaves correctly.',
              'If the cleanest path is a separate follow-up PR instead of changing this branch directly, create that PR and link it in this thread.',
              '',
              applied
                ? '@claude Verify that every auto-applied suggestion was correctly applied without dropping intent. Check for any remaining unapplied items.'
                : '@claude After the fixes are applied, verify that every top-level and nested thread comment was addressed without dropping intent.',
              '@codex Also review the final changes for correctness, regressions, any missed thread items, and whether a follow-up PR was the right split.',
            ].join('\n');

            if (existingIssueComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingIssueComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
